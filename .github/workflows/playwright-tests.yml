name: Playwright Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure backend source is present
        run: |
          if [ -f todo-be/package.json ]; then
            echo "Using local todo-be directory from repository checkout"
          else
            echo "todo-be directory missing, cloning morosystems/todo-be"
            git clone --depth=1 https://github.com/morosystems/todo-be.git todo-be
          fi

          if [ ! -f todo-be/package.json ]; then
            echo "todo-be/package.json still missing after checkout/clone"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            todo-be/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: |
          if [ -f todo-be/package-lock.json ]; then
            npm ci --prefix todo-be
          else
            echo "todo-be/package-lock.json not found, falling back to npm install"
            npm install --prefix todo-be
          fi

      - name: Start backend
        run: npm --prefix todo-be run start &

      - name: Wait for backend API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/v3/api-docs > /dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time"
          exit 1

      - name: Run integration tests
        env:
          API_URL: http://localhost:8080
        run: npx playwright test tests/integration

      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-integration
          path: playwright-report/
          if-no-files-found: ignore

  e2e:
    name: E2E Tests
    # needs: integration // would make sense if the suites were connected (e.g. do not run e2e if integration fails)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run e2e tests
        run: npx playwright test tests/e2e --pass-with-no-tests

      - name: Upload e2e report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e
          path: playwright-report/
          if-no-files-found: ignore
